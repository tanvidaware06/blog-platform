<!DOCTYPE html>
<html>
<head>
    <title>Blog Platform</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

        .post{
            border:1px solid #ccc;
            padding:15px;
            margin-top:15px;
        }
    </style>
</head>
<body>

<h1>Blog Platform with Comments</h1>

<h2>Create Post</h2>

<input type="text" id="title" placeholder="Post Title">

<textarea id="content" placeholder="Write your post"></textarea>

<button onclick="createPost()">Publish</button>

<div id="posts"></div>

<script>

let posts = [];

function createPost(){

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if(title === "" || content === ""){
        alert("Fill all fields");
        return;
    }

    posts.push({
        title,
        content,
        comments:[]
    });

    document.getElementById("title").value="";
    document.getElementById("content").value="";

    displayPosts();
}

function addComment(index){

    const text = document.getElementById("comment-"+index).value;

    if(text==="") return;

    posts[index].comments.push(text);

    displayPosts();
}

function displayPosts(){

    let html="";

    posts.forEach((post,index)=>{

        html += `
        <div class="post">
            <h3>${post.title}</h3>
            <p>${post.content}</p>

            <input id="comment-${index}" placeholder="Add Comment">

            <button onclick="addComment(${index})">Comment</button>

            <h4>Comments</h4>

            <ul>
                ${post.comments.map(c=>`<li>${c}</li>`).join("")}
            </ul>
        </div>
        `;
    });

    document.getElementById("posts").innerHTML = html;
}

</script>

</body>
</html>
